<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Products Online</title>
    
    <style>

.navbar {
  background: #111;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.nav-container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo {
  font-size: 20px;
  font-weight: bold;
  color: #ffffff; 
  text-decoration: none;
  color: inherit;
}


.logo:visited {
  color: inherit;
}

/* MENU ICON */
.menu-toggle {
  font-size: 24px;
  cursor: pointer;
  color: #fff;
}

/* NAV LINKS */
.nav-links {
  display: none;
  flex-direction: column;
  background: #111;
  position: absolute;
  top: 60px;
  right: 0;
  width: 200px;
}

.nav-links a {
  padding: 10px;
  text-decoration: none;
  color: #fff;
  border-top: 1px solid #333;
}

.nav-links a:hover {
  background: #222;
}

/* ACTIVE MENU */
.nav-links.active {
  display: flex;
}


        
        body{
            background: #ffffff;
            font-family: arial;
            text-align: center;
        }


        .circle{
    counter-reset: list-counter;
    list-style: none;
    float:left;
}
.circle li{
    margin: 1.5em 0;    
}
.circle li:before{
    content: counter(list-counter);
    counter-increment: list-counter;
    width: 1em;
    height: 1em;
    padding: .5em;
    margin-right: 1em;
    border-radius: 50%;
    border: .25em solid #ccc;
    background: #000;
    color: #fff;
    font-family: arial;
    font-weight: bold;
    text-align: center;
    display: inline-block;
    
}
    </style>

    <script>
const toggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

toggle.addEventListener("click", () => {
  navLinks.classList.toggle("active");
});
</script>
    
</head>
<body>

    
    <!--             Navbar              -->
  <header class="navbar">

  <div class="nav-container">
    
    <!-- LOGO -->
    <a href="/" class="logo">Pro Products Online</a>

    <!-- MENU ICON (MOBILE) -->

    <nav class="nav-links" id="nav-links">

      <a href="#">Contact</a>
    </nav>

  </div>

</header>

</body>
</html>
